# Or commit to trigger the pre-commit hook if enabled.
concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ci-${{ github.head_ref || github.ref_name }}
jobs:
  build:
    name: Build ${{ matrix.attrs.hostname }} (${{ matrix.attrs.hostPlatform }})
    runs-on: ${{ matrix.attrs.runsOn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Purge non-Nix files
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: rampage
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          gc-max-store-size-linux: 5G
          primary-key:
            nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock')
            }}
          purge: true
          purge-created: 0
          purge-last-accessed: 0
          purge-prefixes: nix-${{ runner.os }}-
          purge-primary-key: never
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: Remove unbuildable modules
        run: |-
          rm -f \
            modules/vmware.nix \
            modules/school/cisco.nix
      - name: Fast nix build
        run:
          nix run nixpkgs#nix-fast-build -- --no-nom --skip-cached --retries=3 --option
          accept-flake-config true --flake="git+file:.#${{ matrix.attrs.attr }}"
    strategy:
      fail-fast: false
      matrix:
        attrs:
          - hostPlatform: x86_64-linux
            hostname: athenas
            output: nixosConfigurations.athenas.config.system.build.toplevel
            runsOn: ubuntu-latest
          - hostPlatform: x86_64-linux
            hostname: pandora
            output: nixosConfigurations.pandora.config.system.build.toplevel
            runsOn: ubuntu-latest
          - hostPlatform: x86_64-linux
            hostname: promethea
            output: nixosConfigurations.promethea.config.system.build.toplevel
            runsOn: ubuntu-latest
          - hostPlatform: x86_64-linux
            hostname: sanctuary
            output: nixosConfigurations.sanctuary.config.system.build.toplevel
            runsOn: ubuntu-latest
          - hostPlatform: aarch64-linux
            hostname: xylourgos
            output: nixosConfigurations.xylourgos.config.system.build.toplevel
            runsOn: ubuntu-24.04-arm
    timeout-minutes: 60
  check:
    if: always()
    name: All checks
    needs:
      - flake-check
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
    timeout-minutes: 60
  flake-check:
    name: Flake check ${{ matrix.systems.hostPlatform }}
    runs-on: ${{ matrix.systems.runsOn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Purge non-Nix files
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: rampage
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          gc-max-store-size-linux: 5G
          primary-key:
            nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock')
            }}
          purge: true
          purge-created: 0
          purge-last-accessed: 0
          purge-prefixes: nix-${{ runner.os }}-
          purge-primary-key: never
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - name: Remove unbuildable modules
        run: |-
          rm -f \
            modules/vmware.nix \
            modules/school/cisco.nix
      - name: nix flake check
        run: nix flake check 'git+file:.'
      - name: nix flake show
        run: nix flake show 'git+file:.'
    strategy:
      matrix:
        systems:
          - hostPlatform: x86_64-linux
            runsOn: ubuntu-latest
          - hostPlatform: aarch64-linux
            runsOn: ubuntu-24.04-arm
    timeout-minutes: 60
name: CI
"on":
  pull_request: {}
  push:
    branches:
      - main
      - testing-*
  workflow_dispatch: {}
