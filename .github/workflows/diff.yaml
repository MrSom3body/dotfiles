# Or commit to trigger the pre-commit hook if enabled.
concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: diff-${{ github.head_ref || github.ref_name }}
jobs:
  generate-diffs:
    name: Generate Diff
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Purge non-Nix files
      uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7
      with:
        hatchet-protocol: rampage
    - name: Install Nix
      uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
      with:
        extra_nix_config: |-
          always-allow-substitutes = true
          builders-use-substitutes = true
          max-jobs = auto
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Cachix
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        extraPullNames: nix-community
        name: som3cache
    - name: Generate diff
      uses: natsukium/nix-diff-action@b5c316c6cafc8470037d7f330b178aaeeba96ba4
      with:
        attributes: |-
          - displayName: athenas
            attribute: nixosConfigurations.athenas.config.system.build.toplevel
          - displayName: pandora
            attribute: nixosConfigurations.pandora.config.system.build.toplevel
          - displayName: promethea
            attribute: nixosConfigurations.promethea.config.system.build.toplevel
          - displayName: sanctuary
            attribute: nixosConfigurations.sanctuary.config.system.build.toplevel
          - displayName: xylourgos
            attribute: nixosConfigurations.xylourgos.config.system.build.toplevel
        mode: full
name: Diff
'on':
  pull_request:
    paths:
    - flake.lock
  workflow_dispatch: {}
