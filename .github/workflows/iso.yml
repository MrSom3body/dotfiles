name: "Build my custom ISO"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * mon" # every monday at 3AM
jobs:
  build-images:
    name: "Build ISO image"
    if: github.repository == 'MrSom3body/dotfiles'
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v4
      with:
        token: "${{ secrets.GITHUB_TOKEN }}"

    - name: "Install Nix"
      uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}      
        extra_nix_config: |
          experimental-features = nix-command flakes

    - name: "Install nix-fast-build"
      run: nix profile install nixpkgs#nix-fast-build

    - name: "Build ISO image"
      run: |
        nix-fast-build --skip-cached --no-nom \
          --flake .#packages.x86_64-linux.default \
          --out-link nixos

    - name: "Upload ISO Artifacts"
      uses: actions/upload-artifact@v4
      with:
        name: nixos-iso-image
        path: nixos-/iso/*.iso

  publish-images:
    name: "Publish the built image"
    runs-on: ubuntu-latest
    needs: build-images
    permissions:
      contents: write
    steps:
    - name: "Download ISO Artifacts"
      uses: actions/download-artifact@v4
      with:
        merge-multiple: true
    
    - name: "Get current date"
      id: get-date
      run: echo "date=$(date +'%Y-%m-%d-%H%M%S')" >> "${GITHUB_OUTPUT}"

    - name: Create release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TITLE: "iso-${{ steps.get-date.outputs.date }}"
      run: |
        gh release create "$TITLE" \
            --repo="$GITHUB_REPOSITORY" \
            --title="$TITLE" \
            --notes "
              # Weekly ISO release
              These release publish a custom ISO which I can use to install
              NixOS on my devices. These ISOs are ONLY meant for me and nobody
              else as I can ssh into root without needing an password!
            "

    - name: Upload assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TITLE: "iso-${{ steps.get-date.outputs.date }}"
      run: |
        gh release upload "$TITLE" *.iso --repo="$GITHUB_REPOSITORY"
