jobs:
  regenerate:
    if: github.actor == 'renovate[bot]' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - id: app-token
      name: Generate App Token
      uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 2
        ref: ${{ github.head_ref || github.ref_name }}
        token: ${{ steps.app-token.outputs.token }}
    - name: Install Nix
      uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b
      with:
        extra_nix_config: |-
          always-allow-substitutes = true
          builders-use-substitutes = true
          max-jobs = auto
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Cachix
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
      with:
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        extraPullNames: nix-community
        name: som3cache
    - name: Regenerate workflows
      run: nix run .#render-workflows
    - name: Amend commit with regenerated workflows
      run: |-
        git config user.name "mrsom3body-bot[bot]"
        git config user.email "261862837+MrSom3body-Bot[bot]@users.noreply.github.com"
        git add .github/workflows/
        git diff --staged --quiet || git commit --amend --no-edit
        git push --force-with-lease
    - env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      name: Auto Merge PR (${{ github.event.pull_request.number }})
      run: |-
        if [ -n "${{ github.event.pull_request.number }}" ]; then
          gh pr merge --auto --rebase ${{ github.event.pull_request.number }}
        fi
name: Regenerate workflows
'on':
  pull_request:
    paths:
    - modules/flake/actions.nix
    - flake.lock
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
